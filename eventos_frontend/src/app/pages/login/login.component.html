<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/branding/logo.svg" alt="Zentry Logo" class="logo-img">
      <h2>Iniciar Sesión</h2>
      <p>Ingresa tus credenciales para acceder a Zentry Eventos</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="ejemplo@zentry.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="••••••••" 
          required
        >
      </div>

      @if (errorMessage()) {
        <div class="error-alert">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="btn-login" [disabled]="isLoading()">
        @if (isLoading()) {
          <span>Cargando...</span>
        } @else {
          <span>Entrar</span>
        }
      </button>
    </form>

    <div class="login-footer">
      <p>Credenciales de prueba:</p>
      <ul>
        <li>Admin: admin@zentry.com / 123456</li>
        <li>Staff: staff@zentry.com / 123456</li>
      </ul>
      <a href="/" class="back-link">Volver al inicio</a>
    </div>
  </div>
</div>
