<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-logo" routerLink="/inicio">
      <img src="assets/branding/logo.svg" alt="Zentry Logo" class="logo-img">
      <span class="logo-text">ZENTRY <span class="accent">EVENTOS</span></span>
    </div>
    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Inicio</a>
      
      @if (authService.isLoggedIn()) {
        <a href="#" class="nav-link">Eventos</a>
        <a href="#" class="nav-link">Invitaciones</a>
        
        <div class="user-info">
          <span class="user-name">{{ authService.currentUser()?.nombre }}</span>
          <span class="user-rol">({{ authService.currentUser()?.rol }})</span>
          <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
        </div>
      } @else {
        <button class="btn-login" routerLink="/login">Iniciar Sesión</button>
      }
    </div>
  </div>
</nav>
