<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-logo" (click)="onLogoClick()">
      <img src="assets/branding/logo.jpg" alt="Zentry Logo" class="logo-img">
      <span class="logo-text">ZENTRY <span class="accent">EVENTOS</span></span>
    </div>
    <div class="navbar-links">
      @if (authService.isLoggedIn()) {
        <div class="user-info">
          <span class="user-name">{{ authService.currentUser()?.nombreDeUsuario }}</span>
          <span class="user-rol">({{ authService.currentUser()?.roles?.[0] }})</span>
          <button class="btn-logout" (click)="logout()" title="Cerrar Sesión">
            <span class="logout-text">Cerrar Sesión</span>
            <span class="logout-icon-wrapper">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#ff0000" class="logout-icon">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path d="M21 12L13 12" stroke="#ff00a2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M18 15L20.913 12.087V12.087C20.961 12.039 20.961 11.961 20.913 11.913V11.913L18 9" stroke="#ff00a2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path d="M16 5V4.5V4.5C16 3.67157 15.3284 3 14.5 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H14.5C15.3284 21 16 20.3284 16 19.5V19.5V19" stroke="#ff00a2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </g>
              </svg>
            </span>
          </button>
        </div>
      } @else {
        <button class="btn-login" routerLink="/login">Iniciar Sesión</button>
      }
    </div>
  </div>
</nav>
