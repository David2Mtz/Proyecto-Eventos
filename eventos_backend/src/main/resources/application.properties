spring.application.name=eventos-backend

# ==========================================
# CONFIGURACIÓN PARA DESPLIEGUE (Render)
# ==========================================
# Render asigna automáticamente el puerto a través de la variable de entorno PORT
server.port=${PORT:8080}

# Orígenes permitidos para CORS (Cambiar por la URL de Netlify en producción)
# Ejemplo en Render: ALLOWED_ORIGINS=https://tu-app.netlify.app
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# ==========================================
# BASE DE DATOS (YugabyteDB / PostgreSQL)
# ==========================================
# Para Yugabyte Cloud, usa la URL proporcionada en el dashboard.
# Ejemplo: jdbc:postgresql://<host>:5433/yugabyte?ssl=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventos_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
# Si recibes errores de "column contains null values" o "column does not exist", 
# cambia temporalmente a 'create' para limpiar la BD local:
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Correo
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=ld.martinez.117@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/documentacion/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

# JWT
jwt.secret=${JWT_SECRET:WmVudHJ5U2VjcmV0S2V5MjAyNlByb3llY3RvRXZlbnRvc1NlZ3VyYQ==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
